name: Build & Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  build-api:
    runs-on: ubuntu-latest
    outputs:
      api-tag: ${{ steps.meta.outputs.api-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="test-${SHORT_SHA}"
          fi
          echo "api-tag=${TAG}" >> $GITHUB_OUTPUT
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "api-image=${{ env.REGISTRY }}/${OWNER}/urca-tournament-api" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: 'arm64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.api-image }}:${{ steps.meta.outputs.api-tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-web:
    runs-on: ubuntu-latest
    needs: build-api
    outputs:
      web-tag: ${{ steps.meta.outputs.web-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="test-${SHORT_SHA}"
          fi
          echo "web-tag=${TAG}" >> $GITHUB_OUTPUT
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "web-image=${{ env.REGISTRY }}/${OWNER}/urca-tournament-web" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: 'arm64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.web-image }}:${{ steps.meta.outputs.web-tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  update-test:
    needs: [build-api, build-web]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update test kustomization
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s/newTag:.*/newTag: test-${SHORT_SHA}/" k8s/overlays/test/kustomization.yaml

      - name: Commit and push
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/test/kustomization.yaml
          git commit -m "chore(test): update images to test-${SHORT_SHA}" || echo "No changes to commit"
          git push origin main

  update-production:
    needs: [build-api, build-web]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update production kustomization
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          sed -i "s/newTag:.*/newTag: ${TAG}/" k8s/overlays/production/kustomization.yaml

      - name: Commit and push
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/production/kustomization.yaml
          git commit -m "chore(release): update images to ${TAG}" || echo "No changes to commit"
          git push origin main
