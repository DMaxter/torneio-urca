apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: urca-tournament
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - "torneio.dmaxter.pt"
  rules:
    - backendRefs:
        - name: urca-tournament
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
